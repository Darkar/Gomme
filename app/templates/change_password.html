<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gomme — {{T "change_pw.title"}}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div style="width:52px;height:52px;background:#ee0000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:14px">G</div>
        <h1>Gomme</h1>
        {{if .MustChange}}
        <p>{{T "change_pw.first_login"}}</p>
        {{else}}
        <p>{{T "change_pw.title"}}</p>
        {{end}}
      </div>

      {{if .Error}}
      <div class="form-error">{{.Error}}</div>
      {{end}}

      <form method="POST" action="/change-password">
        {{if not .MustChange}}
        <div class="form-group">
          <label for="current_password">{{T "change_pw.current"}}</label>
          <input
            type="password"
            id="current_password"
            name="current_password"
            autocomplete="current-password"
            autofocus
            required
          >
        </div>
        {{end}}
        <div class="form-group">
          <label for="new_password">{{T "change_pw.new"}}</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            autocomplete="new-password"
            minlength="6"
            {{if .MustChange}}autofocus{{end}}
            required
          >
        </div>
        <div class="form-group">
          <label for="confirm_password">{{T "change_pw.confirm"}}</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            autocomplete="new-password"
            minlength="6"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary btn-full">{{T "change_pw.submit"}}</button>
      </form>

      {{if not .MustChange}}
      <div style="margin-top:16px;text-align:center">
        <a href="/dashboard" style="font-size:13px;color:var(--text-muted);text-decoration:none">{{T "change_pw.back"}}</a>
      </div>
      {{end}}
    </div>
  </div>
</body>
</html>
