<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gomme — {{T "admin.sidebar.title"}} — {{T "admin.settings.title"}}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app-layout">

    {{template "navbar" .}}

    <div class="content-layout" style="overflow-y:auto;">

      <aside class="sidebar">
        <div class="sidebar-section">
          <h3>{{T "admin.sidebar.title"}}</h3>
          <div style="display:flex;flex-direction:column;gap:4px">
            <a href="/admin/users" style="color:var(--text-muted);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px">{{T "admin.sidebar.users"}}</a>
            <a href="/admin/playbooks" style="color:var(--text-muted);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px">{{T "admin.sidebar.runs"}}</a>
            <a href="/admin/images" style="color:var(--text-muted);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px">{{T "admin.sidebar.images"}}</a>
            <a href="/admin/settings" style="color:var(--text);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px;background:var(--bg-3)">{{T "admin.sidebar.settings"}}</a>
          </div>
        </div>
      </aside>

      <div class="page-content" style="max-width:640px">

        <div class="page-header">
          <h1 class="page-title">{{T "admin.settings.title"}}</h1>
        </div>

        {{if .Success}}<div class="alert alert-success">{{.Success}}</div>{{end}}

        <form method="POST" action="/admin/settings">
          <div class="section">
            <div class="section-header">{{T "admin.settings.sync.title"}}</div>
            <div class="modal-body">
              <div class="form-group">
                <label>{{T "admin.settings.sync.label"}}</label>
                <input type="number" name="sync_interval" value="{{index .Settings "sync_interval"}}" placeholder="30" min="1">
              </div>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-top:16px">
            <button type="submit" class="btn btn-primary">{{T "btn.save"}}</button>
          </div>
        </form>

      </div>
    </div>
  </div>
</body>
</html>
