<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gomme — Admin — Paramètres</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app-layout">

    <nav class="navbar">
      <span class="nav-brand">Gomme</span>
      <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/inventory/list">Inventaire</a>
        <a href="/repository">Repositories</a>
        <a href="/playbooks">Playbooks</a>
        <a href="/tasks">Tâches</a>
        <a href="/organizations">Organisations</a>
        <a href="/credentials">Identifiants</a>
        <a href="/admin/users" class="active">Admin</a>
      </div>
      <div class="nav-user">
        <a href="/change-password" style="color:var(--text-muted);font-size:13px;text-decoration:none">{{.User.Username}}</a>
        <a href="/logout">Déconnexion</a>
      </div>
    </nav>

    <div class="content-layout" style="overflow-y:auto;">

      <aside class="sidebar">
        <div class="sidebar-section">
          <h3>Administration</h3>
          <div style="display:flex;flex-direction:column;gap:4px">
            <a href="/admin/users" style="color:var(--text-muted);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px">Utilisateurs</a>
            <a href="/admin/playbooks" style="color:var(--text-muted);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px">Exécutions</a>
            <a href="/admin/images" style="color:var(--text-muted);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px">Images</a>
            <a href="/admin/settings" style="color:var(--text);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:4px;background:var(--bg-3)">Paramètres</a>
          </div>
        </div>
      </aside>

      <div class="page-content" style="max-width:640px">

        <div class="page-header">
          <h1 class="page-title">Paramètres généraux</h1>
        </div>

        {{if .Success}}<div class="alert alert-success">{{.Success}}</div>{{end}}

        <form method="POST" action="/admin/settings">
          <div class="section">
            <div class="section-header">Synchronisation</div>
            <div class="modal-body">
              <div class="form-group">
                <label>Intervalle de sync automatique (minutes)</label>
                <input type="number" name="sync_interval" value="{{index .Settings "sync_interval"}}" placeholder="30" min="1">
              </div>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-top:16px">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>

      </div>
    </div>
  </div>
</body>
</html>
